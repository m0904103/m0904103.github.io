name: Daily AI Stock Scanner

on:
  schedule:
    # 美股收盤後 30 分鐘自動執行 (夏令 EDT)
    # 美股收盤：台灣時間 隔日 04:00 (EDT = UTC-4 → UTC 20:00)
    # 執行時機：台灣時間 隔日 04:30 (UTC 20:30)，確保當日收盤數據完整結算
    # 週二到週六執行 (因為抓的是前一交易日美股收盤，週一盤 = 週二台灣時間凌晨)
    - cron: '30 20 * * 2-6'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行

jobs:
  run-daily-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py
