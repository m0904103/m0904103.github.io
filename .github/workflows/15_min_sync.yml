name: ⚡ 15-Min Live Sync

on:
  schedule:
    # Taiwan Market (09:00 - 13:30 Taipei Time) -> (01:00 - 05:30 UTC)
    - cron: '*/15 1-5 * * 1-5'
    # US Market (21:30 - 04:00 Taipei Time) -> (13:30 - 20:00 UTC)
    - cron: '*/15 13-20 * * 1-5'
  workflow_dispatch: # Allows manual trigger

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas

      - name: 🔄 Sync 253 Stocks (TW + US)
        run: python sync_regular_army_2026.py

      - name: 🚀 Deploy to GitHub Pages (trading folder)
        run: python upload_frontend.py
