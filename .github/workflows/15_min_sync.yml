name: DISABLED - 15-Min Live Sync (replaced by master_sync.yml)

on:
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas

      - name: 🔄 Sync 253 Stocks (TW + US)
        run: python sync_regular_army_2026.py

      - name: 🚀 Deploy to GitHub Pages (trading folder)
        run: python upload_frontend.py
