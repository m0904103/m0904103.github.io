name: Scrape Taiwan VIX

on:
  schedule:
    # Run every hour from 01:00 to 06:00 UTC on weekdays (Monday-Friday)
    # This corresponds to 09:00 to 14:00 Taiwan time (UTC+8)
    - cron: '0 1-6 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape-vix:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright
        playwright install chromium
        playwright install-deps

    - name: Run Scraper
      run: python fetch_vix.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Check if vix.json was modified
        if git diff --quiet trading/vix.json; then
          echo "No changes to vix.json"
        else
          git add trading/vix.json
          git commit -m "Auto-update Taiwan VIX data"
          git push
        fi
