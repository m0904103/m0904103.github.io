name: Scrape Taiwan VIX

on:
  schedule:
    # Run every hour from 01:00 to 06:00 UTC on weekdays (Monday-Friday)
    # This corresponds to 09:00 to 14:00 Taiwan time (UTC+8)
    - cron: '0 1-6 * * 1-5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write  # Required to commit and push vix.json back to the repo

jobs:
  scrape-vix:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Scraper
      run: python fetch_vix.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -f trading/vix.json
        git diff --staged --quiet && echo "No changes to commit" || git commit -m "Auto-update Taiwan VIX data"
        git push origin HEAD:main

