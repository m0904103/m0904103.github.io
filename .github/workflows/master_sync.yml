name: Regular Army Master Sync

on:
  schedule:
    # ============================================================
    # 台股盤中 09:00-13:30 (台灣時間) = 01:00-05:30 UTC
    # 每 15 分鐘同步一次
    # ============================================================
    - cron: '0,15,30,45 1,2,3,4 * * 1-5'
    - cron: '0,15,30 5 * * 1-5'

    # ============================================================
    # 美股盤中 21:30-04:00 (台灣時間) = 13:30-20:00 UTC
    # 每 15 分鐘同步一次
    # ============================================================
    - cron: '30,45 13 * * 1-5'
    - cron: '0,15,30,45 14,15,16,17,18,19 * * 1-5'
    - cron: '0 20 * * 2-6'

    # ============================================================
    # 非交易時間 - 每小時同步一次（保底）
    # ============================================================
    - cron: '0 6,7,8,9,10,11,12,21,22,23 * * 1-5'
    - cron: '0 0,3,6,9,12,15,18,21 * * 0,6'

  workflow_dispatch:  # 允許在 GitHub 網頁手動觸發

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Future-proof: use Node.js 24

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node Dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Master Sync (Yahoo Finance + TWSE Dual Source)
        run: python sync_regular_army_2026.py

      - name: Run Big Data Engine (TW Three-Rates Filter)
        run: python scan_tw_big_data.py

      - name: Build Frontend
        run: npm run build
        working-directory: frontend

      - name: Deploy to GitHub Pages (trading/ folder)
        run: python upload_frontend.py

      - name: Commit and Push All Changes
        run: |
          git config --global user.name "Regular-Army-Bot"
          git config --global user.email "bot@regular-army.ai"
          git add frontend/public/scan_results.json trading/ || true
          git diff --cached --quiet || git commit -m "auto-sync: $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M CST')"
          git push origin main || true

