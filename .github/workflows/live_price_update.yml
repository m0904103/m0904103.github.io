name: DISABLED - Live Price Updater (replaced by master_sync.yml)

on:
  workflow_dispatch:  # 只允許手動觸發

jobs:
  update-live-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許 push 回 repo

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas

      - name: ⚡ Run Live Price Updater
        run: python price_updater.py

      - name: 📤 Commit and Push Updated Prices
        run: |
          git config --global user.name "Price-Bot"
          git config --global user.email "price-bot@github-actions"
          git add trading/scan_results.json frontend/public/scan_results.json scan_results.json || true
          # 只有在有變動時才 commit（避免空 commit）
          git diff --cached --quiet || git commit -m "⚡ Live price update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main || true
