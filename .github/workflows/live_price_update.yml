name: ⚡ Live Price Updater (Market Hours)

on:
  schedule:
    # ======================================================
    # 台股盤中：台灣時間 09:00-13:30（UTC 01:00-05:30）
    # 每 30 分鐘更新一次台股即時價格（TWSE OpenAPI，免費無限制）
    # ======================================================
    - cron: '0,30 1,2,3,4 * * 1-5'   # UTC 01:00~04:30 (台灣 09:00~12:30)
    - cron: '0,30 5 * * 1-5'          # UTC 05:00~05:30 (台灣 13:00~13:30)

    # ======================================================
    # 美股盤中：台灣時間 21:30-04:00（UTC 13:30-20:00 EDT）
    # 每 30 分鐘更新一次美股即時價格（yfinance fast_info 輕量模式）
    # ======================================================
    - cron: '30 13,14,15,16,17,18,19 * * 1-5'  # UTC 13:30~19:30
    - cron: '0 14,15,16,17,18,19,20 * * 2-6'   # UTC 14:00~20:00（週二到週六含週一盤後）

  workflow_dispatch:  # 允許在 GitHub 網頁手動觸發

jobs:
  update-live-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許 push 回 repo

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas

      - name: ⚡ Run Live Price Updater
        run: python price_updater.py

      - name: 📤 Commit and Push Updated Prices
        run: |
          git config --global user.name "Price-Bot"
          git config --global user.email "price-bot@github-actions"
          git add trading/scan_results.json frontend/public/scan_results.json scan_results.json || true
          # 只有在有變動時才 commit（避免空 commit）
          git diff --cached --quiet || git commit -m "⚡ Live price update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main || true
