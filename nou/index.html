<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>空大期末考 特訓大廳 (Study Portal)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-hover: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-1: #3b82f6;
            --accent-2: #8b5cf6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(125deg, #0f172a, #1e1b4b, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -2;
        }

        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            animation: float 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-1);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: var(--accent-2);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 50px) scale(1.1); }
            100% { transform: translate(-50px, 100px) scale(0.9); }
        }

        /* Main Container */
        .portal-container {
            width: 90%;
            max-width: 1000px;
            padding: 40px;
            margin: 20px auto;
            text-align: center;
        }

        .header {
            margin-bottom: 50px;
            animation: fadeDown 1s ease forwards;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
        }

        .header p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 15px;
        }

        /* Cards Grid */
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
            perspective: 1000px;
        }

        .course-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            animation: fadeUp 1s ease backwards;
        }

        .course-card:nth-child(1) { animation-delay: 0.2s; }
        .course-card:nth-child(2) { animation-delay: 0.4s; }

        .course-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg);
            transition: all 0.7s ease;
        }

        .course-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: var(--card-hover);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(96, 165, 250, 0.2);
            border-color: rgba(255,255,255,0.2);
        }

        .course-card:hover::before {
            left: 200%;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .course-card:hover .icon-wrapper {
            transform: scale(1.1) rotate(5deg);
        }

        .card-1 .icon-wrapper { color: #f472b6; }
        .card-2 .icon-wrapper { color: #4ade80; }

        .course-card h2 {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .course-card p {
            font-size: 1rem;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.5;
        }

        .btn-enter {
            margin-top: 25px;
            padding: 10px 25px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .course-card:hover .btn-enter {
            background: white;
            color: #0f172a;
        }

        /* Animations */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: 50px;
            color: var(--text-muted);
            font-size: 0.9rem;
            animation: fadeUp 1s ease backwards;
            animation-delay: 0.6s;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .portal-container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="portal-container">
        <div class="header">
            <h1><i class="fas fa-graduation-cap"></i> 空大期末考 特訓大廳</h1>
            <p>選擇你要複習的科目，開始考前衝刺！</p>
        </div>

        <div class="courses-grid">
            <!-- 性別、健康與多元文化 -->
            <a href="https://m0904103.github.io/gender-health-study-app/" class="course-card card-1" target="_blank" rel="noopener noreferrer">
                <div class="icon-wrapper">
                    <i class="fas fa-heartbeat"></i>
                </div>
                <h2>性別、健康與多元文化</h2>
                <p>114下學期重點整理<br>包含單選題、克漏字、問答閃卡</p>
                <div class="btn-enter">進入特訓 <i class="fas fa-arrow-right"></i></div>
            </a>

            <!-- 人際關係 -->
            <a href="https://m0904103.github.io/nou-interpersonal-relationships/" class="course-card card-2" target="_blank" rel="noopener noreferrer">
                <div class="icon-wrapper">
                    <i class="fas fa-users"></i>
                </div>
                <h2>人際關係</h2>
                <p>人際互動與溝通技巧<br>重點整理與練習題庫</p>
                <div class="btn-enter">進入特訓 <i class="fas fa-arrow-right"></i></div>
            </a>
        </div>

        <footer>
            &copy; 2026 期末考特訓團隊. 祝大家考試順利 All Pass! 💯
        </footer>
    </div>
</body>
</html>
