<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>盤前戰略建議 | 投資理財戰情室</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --panel-bg: rgba(20, 20, 30, 0.6);
            --panel-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #00f0ff;
            --accent-pink: #ff3366;
            --accent-gold: #fbbf24;
            --glass-blur: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* Dynamic Background */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 51, 102, 0.08) 0%, transparent 50%);
            animation: pulse-bg 10s ease-in-out infinite alternate;
        }

        @keyframes pulse-bg {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Layout */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px 20px;
            padding-bottom: 80px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 32px;
            animation: fade-down 0.8s ease forwards;
        }

        .title-badge {
            display: inline-block;
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent-blue);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(0, 240, 255, 0.3);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .timestamp {
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--panel-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fade-up 0.8s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .glass-card:nth-child(1) { animation-delay: 0.1s; }
        .glass-card:nth-child(2) { animation-delay: 0.2s; }
        .glass-card:nth-child(3) { animation-delay: 0.3s; }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }

        .icon-box {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .icon-blue { background: rgba(0, 240, 255, 0.1); color: var(--accent-blue); border: 1px solid rgba(0,240,255,0.2); }
        .icon-gold { background: rgba(251, 191, 36, 0.1); color: var(--accent-gold); border: 1px solid rgba(251,191,36,0.2); }
        .icon-pink { background: rgba(255, 51, 102, 0.1); color: var(--accent-pink); border: 1px solid rgba(255,51,102,0.2); }

        h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
        }

        /* Markdown Content Styling within Cards */
        .content {
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .content p { margin-bottom: 12px; }
        .content ul { margin-left: 20px; margin-bottom: 12px; }
        .content li { margin-bottom: 6px; padding-left: 4px; }
        .content strong { color: #fff; font-weight: 600; }
        
        .content h3 {
            font-size: 1.05rem;
            color: var(--accent-blue);
            margin: 16px 0 8px 0;
        }

        /* Animations */
        @keyframes fade-down {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* Pulse indicator */
        .live-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-pink);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent-pink);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container">
        <header>
            <div class="title-badge">AI DAILY BRIEFING</div>
            <h1>戰情室盤前戰略預報</h1>
            <div class="timestamp">
                <span class="live-dot"></span>
                更新時間: {{DATE_TIME}}
            </div>
        </header>

        <!-- 顏老師的量化紀律視角 -->
        <div class="glass-card">
            <div class="card-header">
                <div class="icon-box icon-blue">👨‍🏫</div>
                <h2>顏老師的量化紀律</h2>
            </div>
            <div class="content">
                {{TEACHER_YEN_CONTENT}}
            </div>
        </div>

        <!-- 阿村伯的市場與地緣大局觀 -->
        <div class="glass-card">
            <div class="card-header">
                <div class="icon-box icon-gold">👴</div>
                <h2>阿村伯的總經輿情</h2>
            </div>
            <div class="content">
                {{UNCLE_TSUN_CONTENT}}
            </div>
        </div>

        <!-- 綜合給出的「下週/今日戰略建議」 -->
        <div class="glass-card" style="border-color: rgba(255, 51, 102, 0.3); box-shadow: 0 8px 32px rgba(255, 51, 102, 0.1);">
            <div class="card-header">
                <div class="icon-box icon-pink">🎯</div>
                <h2 style="color: var(--accent-pink);">最終行動建議</h2>
            </div>
            <div class="content">
                {{STRATEGY_CONTENT}}
            </div>
        </div>

        <footer>
            &copy; 2026 投資理財戰情室自動化系統<br>
            Powered by GitHub Actions & AI NLP Analysis
        </footer>
    </div>
</body>
</html>
